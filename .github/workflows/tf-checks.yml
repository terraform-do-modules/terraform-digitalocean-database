name: tf-checks
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
jobs:
  basic-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@a26d1abb482f8615f50f54e3e5ca2b9ed0e349d4 # pinned to latest
    with:
      provider: digitalocean
      working_directory: './_examples/basic/'
  complete-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@a26d1abb482f8615f50f54e3e5ca2b9ed0e349d4 # pinned to latest
    with:
      provider: digitalocean
      working_directory: './_examples/complete/'

# Separate job for TFlint workflow call
  tf-lint:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@7bc2965ff8f6b68db9402316dd5dd7498ec9c0e4 # pinned to latest
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
